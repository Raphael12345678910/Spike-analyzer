<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpikeCheck</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    .hero {
      text-align: center;
      margin-bottom: 28px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 42px;
    }

    .hero p {
      margin: 0;
      color: #94a3b8;
      font-size: 18px;
    }

    .upload-card,
    .panel {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    }

    .upload-card {
      margin-bottom: 20px;
    }

    input[type="file"] {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px dashed #64748b;
      background: #0f172a;
      color: #e2e8f0;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 20px;
    }

    video, canvas {
      width: 100%;
      border-radius: 14px;
      margin-top: 14px;
      background: black;
      display: block;
    }

    .results-title {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 22px;
    }

    .stat {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .stat-label {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
    }

    #output {
      margin-top: 16px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px;
      color: #cbd5e1;
      white-space: pre-line;
      min-height: 140px;
    }

    @media (max-width: 850px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>SpikeCheck</h1>
      <p>Upload a side-view volleyball hitting clip and get simple form feedback.</p>
    </div>

    <div class="upload-card">
      <input type="file" id="videoInput" accept="video/*" />
    </div>

    <div class="grid">
      <div class="panel">
        <h2 class="results-title">Video Analysis</h2>
        <video id="video" controls muted></video>
        <canvas id="canvas"></canvas>
      </div>

      <div class="panel">
        <h2 class="results-title">Results</h2>

        <div class="stat">
          <div class="stat-label">Estimated Elbow Angle</div>
          <div class="stat-value" id="angleValue">--</div>
        </div>

        <div class="stat">
          <div class="stat-label">Estimated Contact Height</div>
          <div class="stat-value" id="contactValue">--</div>
        </div>

        <div id="output">Model loading...</div>
      </div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
